# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: Google Workspace MCP
version: "0.1.5"
slug: google_workspace_mcp
description: Google Workspace MCP app for Home Assistant
url: "https://github.com/zxdavb/my-ha-apps/tree/main/google_workspace_mcp"
arch:
  - aarch64
  - amd64
init: false
apparmor: false
map:
  - share:rw
ports:
  8000/tcp: 8000
options:
  google_oauth_client_id: ""
  google_oauth_client_secret: ""
  google_client_secret_path: ""
  user_google_email: ""
  workspace_external_url: ""
  tool_tier: "extended"
  oauth:
    mcp_enable_oauth21: true
    external_oauth21_provider: false
    fastmcp_server_auth_google_jwt_signing_key: ""
    oauthlib_insecure_transport: false
    google_oauth_redirect_uri: ""
    oauth_custom_redirect_uris: ""
    oauth_allowed_origins: ""
  mcp_host:
    workspace_mcp_stateless_mode: false
    workspace_mcp_host: "0.0.0.0"
    workspace_mcp_port: 8000
    transport: "streamable-http"
  access:
    tools: ""
    read_only: false
    single_user: false
    permissions: ""
    allowed_file_dirs: "/share"
schema:
  google_oauth_client_id: "str"
  google_oauth_client_secret: "password?"
  google_client_secret_path: "str?"
  user_google_email: "str?"
  workspace_external_url: "str?"
  tool_tier: "list(core|extended|complete)"
  oauth:
    mcp_enable_oauth21: "bool"
    external_oauth21_provider: "bool"
    fastmcp_server_auth_google_jwt_signing_key: "password?"
    oauthlib_insecure_transport: "bool"
    google_oauth_redirect_uri: "str?"
    oauth_custom_redirect_uris: "str?"
    oauth_allowed_origins: "str?"
  mcp_host:
    workspace_mcp_stateless_mode: "bool"
    workspace_mcp_host: "str"
    workspace_mcp_port: "int"
    transport: "str"
  access:
    tools: "str?"
    read_only: "bool"
    single_user: "bool"
    permissions: "str?"
    allowed_file_dirs: "str?"
