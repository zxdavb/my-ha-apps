name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  find:
    name: Find apps
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.addons.outputs.addons_list }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7.0.0

      - name: 🔍 Find app directories
        id: addons
        uses: home-assistant/actions/helpers/find-addons@master

  lint:
    name: Lint app ${{ matrix.path }}
    runs-on: ubuntu-latest
    needs: find
    strategy:
      matrix:
        path: ${{ fromJson(needs.find.outputs.addons) }}
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7.0.0

      - name: 🚀 Run Home Assistant App Lint
        uses: frenck/action-addon-linter@v2.21
        with:
          path: "./${{ matrix.path }}"

  lint-required:
    name: Lint (required)
    runs-on: ubuntu-latest
    needs:
      - find
      - lint
    if: ${{ always() }}
    steps:
      - name: Enforce lint workflow result
        run: |
          echo "find result: ${{ needs.find.result }}"
          echo "lint result: ${{ needs.lint.result }}"

          if [[ "${{ needs.find.result }}" != "success" ]]; then
            echo "Find apps job failed or was cancelled"
            exit 1
          fi

          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "At least one matrix lint job failed or was cancelled"
            exit 1
          fi

          echo "All lint checks passed"
