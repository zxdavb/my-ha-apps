name: Upstream Update - garmy_mcp

on:
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-update-garmy-mcp
  cancel-in-progress: true

jobs:
  update:
    name: Check garmy fork upstream commit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Update Garmy MCP from upstream
        id: updater
        run: |
          python3 <<'PY'
          import json
          import pathlib
          import re
          import urllib.request

          root = pathlib.Path('.')

          def get_json(url):
              with urllib.request.urlopen(url, timeout=30) as resp:
                  return json.load(resp)

          def get_text(url):
              with urllib.request.urlopen(url, timeout=30) as resp:
                  return resp.read().decode('utf-8')

          def read_first(path, pattern):
              text = path.read_text(encoding='utf-8')
              m = re.search(pattern, text, flags=re.MULTILINE)
              if not m:
                  raise RuntimeError(f"Pattern not found in {path}: {pattern}")
              return m.group(1)

          def replace_one(path, pattern, replacement):
              text = path.read_text(encoding='utf-8')
              new_text, count = re.subn(pattern, replacement, text, flags=re.MULTILINE)
              if count == 0:
                  raise RuntimeError(f"Pattern not found in {path}: {pattern}")
              if new_text != text:
                  path.write_text(new_text, encoding='utf-8')
                  return True
              return False

          def version_for_upstream(current, upstream):
              m = re.match(rf'^{re.escape(upstream)}-ha(\d+)$', current)
              if m:
                  return f"{upstream}-ha{int(m.group(1)) + 1}"
              return f"{upstream}-ha1"

          latest_commit = get_json("https://api.github.com/repos/zxdavb/garmy/commits/master")["sha"]
          latest_version = get_text("https://raw.githubusercontent.com/zxdavb/garmy/master/pyproject.toml")

          version_match = re.search(r'^version\s*=\s*"([^"]+)"$', latest_version, flags=re.MULTILINE)
          if not version_match:
              raise RuntimeError("Could not parse garmy version from pyproject.toml")
          upstream_version = version_match.group(1)

          dockerfile = root / "garmy_mcp" / "Dockerfile"
          current_commit = read_first(dockerfile, r'^ARG GARMY_REF=([^\s]+)$')

          if current_commit != latest_commit:
              replace_one(
                  dockerfile,
                  r'^ARG GARMY_REF=[^\s]+$',
                  f'ARG GARMY_REF={latest_commit}'
              )

              config = root / "garmy_mcp" / "config.yaml"
              current_version = read_first(config, r'^version:\s+"([^"]+)"$')
              next_version = version_for_upstream(current_version, upstream_version)
              replace_one(
                  config,
                  r'^version:\s+"[^"]+"$',
                  f'version: "{next_version}"'
              )

              summary = (
                  f"- garmy_mcp upstream commit: {current_commit[:12]} -> {latest_commit[:12]}\\n"
                  f"- app version: {current_version} -> {next_version}\\n"
              )
          else:
              summary = "No updates available.\\n"

          pathlib.Path('/tmp/upstream-update-summary.txt').write_text(summary, encoding='utf-8')
          print(summary)
          PY

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Show update summary
        run: cat /tmp/upstream-update-summary.txt

      - name: Create pull request
        if: steps.updater.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/upstream-garmy-mcp-updates
          commit-message: "chore(garmy_mcp): update upstream version"
          title: "chore(garmy_mcp): update upstream version"
          body-path: /tmp/upstream-update-summary.txt
          labels: |
            dependencies
            automated pr

      - name: Validate PR safety for auto-merge
        if: steps.updater.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        id: safety
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="${{ steps.cpr.outputs.pull-request-number }}"
          author="$(gh pr view "$pr_number" --json author -q '.author.login')"

          if [ "$author" != "github-actions[bot]" ]; then
            echo "safe=false" >> "$GITHUB_OUTPUT"
            echo "Refusing auto-merge: PR author is $author"
            exit 0
          fi

          allowed_regex='^garmy_mcp/(Dockerfile|config\.yaml)$'
          disallowed=""

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if ! echo "$file" | grep -Eq "$allowed_regex"; then
              disallowed="$disallowed $file"
            fi
          done < <(gh pr view "$pr_number" --json files -q '.files[].path')

          if [ -n "$disallowed" ]; then
            echo "safe=false" >> "$GITHUB_OUTPUT"
            echo "Refusing auto-merge: PR includes disallowed file(s):$disallowed"
            exit 0
          fi

          echo "safe=true" >> "$GITHUB_OUTPUT"

      - name: Enable PR auto-merge
        if: steps.updater.outputs.changed == 'true' && steps.safety.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash; then
            echo "Auto-merge could not be enabled. Ensure repository auto-merge is enabled and branch protections are configured."
          fi
