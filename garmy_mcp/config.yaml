# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: My Garmy MCP
version: "2.0.0-ha12"
slug: garmy_mcp
description: Garmin health data MCP server (read-only SQLite access for AI assistants).
url: "https://github.com/zxdavb/garmy"
arch:
  - amd64
init: false
apparmor: false
map:
  - share:rw
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: MCP HTTP endpoint
options:
  database:
    path: "/data/health.db"
  garmin:
    oauth1_token_json: ""
    oauth2_token_json: ""
  sync:
    interval_hours: 6
    history_days: 7
  mcp:
    host: "0.0.0.0"
    path: "/mcp"
  advanced:
    debug_logging: false
schema:
  database:
    path: "str"
  garmin:
    oauth1_token_json: "password?"
    oauth2_token_json: "password?"
  sync:
    interval_hours: "int(1,168)"
    history_days: "int(1,90)"
  mcp:
    host: "str"
    path: "str"
  advanced:
    debug_logging: "bool"
