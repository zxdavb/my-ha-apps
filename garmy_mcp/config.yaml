# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: My Garmy MCP
version: "2.0.0-ha4"
slug: garmy_mcp
description: Garmin health data MCP server (read-only SQLite access for AI assistants).
url: "https://github.com/zxdavb/garmy"
arch:
  - amd64
init: false
apparmor: false
map:
  - share:rw
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: MCP HTTP endpoint (used when transport is http or streamable-http)
options:
  database:
    path: "/data/health.db"
  garmin:
    email: ""
    password: ""
  sync:
    interval_hours: 6
    days: 7
  mcp:
    host: "0.0.0.0"
    port: 8000
  advanced_mcp:
    transport: "streamable-http"
    path: "/mcp"
schema:
  database:
    path: "str"
  garmin:
    email: "str?"
    password: "password?"
  sync:
    interval_hours: "int(1,168)"
    days: "int(1,90)"
  mcp:
    host: "str"
    port: "int(1,65535)"
  advanced_mcp:
    transport: "list(http|streamable-http|sse)"
    path: "str"
