configuration:
  database:
    name: Database
    description: Core database settings.
    fields:
      path:
        name: Database path
        description: Absolute path to the Garmy SQLite database file.
  garmin:
    name: Garmin Connect
    description: Garmin Connect OAuth tokens. Leave both empty if you already copied token files directly into /data/.garmy/.
    fields:
      oauth1_token_json:
        name: Pasted oauth1_token.json
        description: >-
          For 2FA accounts. Paste the full contents of oauth1_token.json,
          produced by an interactive login elsewhere. Used only to seed
          /data/.garmy/ once; ignored after tokens exist there.
      oauth2_token_json:
        name: Pasted oauth2_token.json
        description: >-
          For 2FA accounts. Paste the full contents of oauth2_token.json,
          produced by an interactive login elsewhere. Used only to seed
          /data/.garmy/ once; ignored after tokens exist there.
  sync:
    name: Sync
    description: Garmin data sync schedule settings.
    fields:
      interval_hours:
        name: Sync interval (hours)
        description: How often to sync data from Garmin Connect (1–168 hours).
      history_days:
        name: History days
        description: How many days of history to sync on each run (1–90 days).
  mcp:
    name: MCP
    description: Core MCP network settings.
    fields:
      host:
        name: Bind address
        description: Bind address for the MCP network listener.
      path:
        name: URL path
        description: Endpoint path for the MCP HTTP endpoint, for example /mcp.
  advanced:
    name: Advanced
    description: Diagnostics for troubleshooting.
    fields:
      debug_logging:
        name: Debug logging
        description: >-
          Enable verbose shell tracing (set -x) and extra Garmin token
          diagnostics in the add-on log. Leave off for normal use; the
          output can be noisy and may include token file paths/sizes.
