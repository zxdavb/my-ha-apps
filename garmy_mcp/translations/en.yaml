configuration:
  database:
    name: Database
    description: Core database settings.
    fields:
      path:
        name: Database path
        description: Absolute path to the Garmy SQLite database file.
  garmin:
    name: Garmin Connect
    description: Garmin Connect OAuth tokens. Leave both empty if you manage token files under /data/.garmy/ directly.
    fields:
      oauth1_token_json:
        name: Pasted oauth1_token.json
        description: >-
          For 2FA accounts. Paste the full contents of oauth1_token.json,
          produced by an interactive login elsewhere. Overwrites
          /data/.garmy/oauth1_token.json on every start; leave blank to
          leave that file untouched (e.g. to keep a token garmy-sync has
          since refreshed).
      oauth2_token_json:
        name: Pasted oauth2_token.json
        description: >-
          For 2FA accounts. Paste the full contents of oauth2_token.json,
          produced by an interactive login elsewhere. Overwrites
          /data/.garmy/oauth2_token.json on every start; leave blank to
          leave that file untouched (e.g. to keep a token garmy-sync has
          since refreshed).
  sync:
    name: Sync
    description: Garmin data sync schedule settings.
    fields:
      interval_hours:
        name: Sync interval (hours)
        description: How often to sync data from Garmin Connect (1–168 hours).
      history_days:
        name: History days
        description: How many days of history to sync on each run (1–999 days).
  mcp:
    name: MCP
    description: Core MCP network settings.
    fields:
      host:
        name: Bind address
        description: Bind address for the MCP network listener.
      path:
        name: URL path
        description: Endpoint path for the MCP HTTP endpoint, for example /mcp.
  advanced:
    name: Advanced
    description: Diagnostics for troubleshooting.
    fields:
      debug_logging:
        name: Debug logging
        description: >-
          Adds Garmin token diagnostics (existence, size, JSON validity) and
          extra bashio detail to the add-on log, to help troubleshoot
          auth/sync issues. Leave off for normal use; its output includes
          token file paths/sizes.
