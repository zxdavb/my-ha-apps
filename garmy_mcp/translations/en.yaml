configuration:
  database:
    name: Database
    description: Core database settings.
    fields:
      path:
        name: Database path
        description: Absolute path to the Garmy SQLite database file.
  garmin:
    name: Garmin Connect
    description: Credentials for Garmin Connect. Leave empty if using manually copied token files.
    fields:
      email:
        name: Email
        description: Garmin Connect account email address.
      password:
        name: Password
        description: Garmin Connect account password. Stored securely and used only to obtain OAuth tokens.
  sync:
    name: Sync
    description: Garmin data sync schedule settings.
    fields:
      interval_hours:
        name: Sync interval (hours)
        description: How often to sync data from Garmin Connect (1–168 hours).
      days:
        name: Days to sync
        description: How many days of history to sync on each run (1–90 days).
  mcp:
    name: MCP
    description: Core MCP network settings.
    fields:
      host:
        name: Bind address
        description: Bind address for the MCP network listener.
      port:
        name: Port
        description: Listen port for the MCP server.
  advanced_mcp:
    name: Advanced MCP
    description: Advanced FastMCP network and URL settings.
    fields:
      transport:
        name: Transport
        description: MCP transport mode (streamable-http, http, or sse). Use streamable-http for URL access.
      path:
        name: URL path
        description: Endpoint path for network transports, for example /mcp.
