# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: RustDesk Server
version: "1.1.15-ha1"
slug: rustdesk-server
description: Self-hosted RustDesk server (hbbs + hbbr) for private remote desktop relay.
url: "https://github.com/rustdesk/rustdesk-server"
arch:
  - amd64
startup: services
init: false
host_network: true
map:
  - type: addon_config
    read_only: false
ports:
  21114/tcp: 21114
  21115/tcp: 21115
  21116/tcp: 21116
  21116/udp: 21116
  21117/tcp: 21117
  21118/tcp: 21118
  21119/tcp: 21119
ports_description:
  21114/tcp: hbbs web console or API (Pro feature, optional)
  21115/tcp: hbbs NAT type test and status query (required)
  21116/tcp: hbbs TCP hole punching and connection service (required)
  21116/udp: hbbs ID registration and heartbeat (required)
  21117/tcp: hbbr relay service (required)
  21118/tcp: hbbs web client support (optional)
  21119/tcp: hbbr web client support (optional)
options:
  encrypted_only: true
  relay: ""
  private_key: ""
  public_key: ""
schema:
  encrypted_only: bool
  relay: str?
  private_key: password?
  public_key: str?
